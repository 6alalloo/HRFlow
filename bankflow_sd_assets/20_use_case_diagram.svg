<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1700" height="980" viewBox="0 0 1700 980" role="img" aria-labelledby="title desc">
  <title id="title">BankFlow Use Case Diagram</title>
  <desc id="desc">A hand-positioned SVG use case diagram for BankFlow with actors on the left and right sides of centered use cases.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2D3748" />
    </marker>
    <style>
      .bg { fill: #FFFFFF; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .boundary { fill: #FFFFFF; stroke: #718096; stroke-width: 2; rx: 14; }
      .group { fill: #FAFAFA; stroke: #A0AEC0; stroke-width: 2; rx: 12; }
      .group-title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .uc { fill: #EBF8FF; stroke: #2B6CB0; stroke-width: 2; }
      .uc-text { font: 700 16px Arial, sans-serif; fill: #1F2937; text-anchor: middle; dominant-baseline: middle; }
      .actor-line { stroke: #2B6CB0; stroke-width: 2.4; fill: none; stroke-linecap: round; }
      .actor-label { font: 700 15px Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .assoc { fill: none; stroke: #2D3748; stroke-width: 2.2; marker-end: url(#arrow); }
      .include { fill: none; stroke: #4A5568; stroke-width: 1.8; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .extend { fill: none; stroke: #4A5568; stroke-width: 1.8; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .label-path { fill: none; stroke: none; }
      .include-text { font: italic 14px Arial, sans-serif; fill: #4A5568; text-anchor: middle; paint-order: stroke fill; stroke: #FFFFFF; stroke-width: 6; stroke-linejoin: round; }
      .extend-text { font: italic 14px Arial, sans-serif; fill: #4A5568; text-anchor: middle; paint-order: stroke fill; stroke: #FFFFFF; stroke-width: 6; stroke-linejoin: round; }
    </style>
